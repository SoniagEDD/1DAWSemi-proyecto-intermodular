<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Alta de Guía</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/crear-guia.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <span class="logo__icon">✈</span>
        <span class="logo__text">SemiDAW Travel Agency</span>
      </div>

      <nav aria-label="Navegación principal">
        <ul class="nav__list">
          <li><a href="../index.html" class="nav__link">Inicio</a></li>
          <li>
            <a href="../pages/usuario-listado.html" class="nav__link"
              >Usuarios</a
            >
          </li>
          <li>
            <a href="../pages/listado-destinos.html" class="nav__link"
              >Destinos</a
            >
          </li>
          <li>
            <a
              href="../pages/listado-guias.html"
              class="nav__link nav__link--active"
              >Guias</a
            >
          </li>
          <li>
            <a href="../pages/listado-reservas.html" class="nav__link"
              >Reservas</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title">Formulario de creación de guía</h2>

        <form id="formGuia" novalidate>
          <fieldset>
            <legend>Datos del guía</legend>

            <label for="nombre">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              required
              minlength="2"
              maxlength="40"
              pattern="[A-Za-zÝÉÝÓÚáéíóúñÑ ]+"
            />

            <label for="apellidos">Apellidos</label>
            <input
              type="text"
              id="apellidos"
              name="apellidos"
              required
              minlength="2"
              maxlength="60"
              pattern="[A-Za-zÝÉÝÓÚáéíóúñÑ ]+"
            />

            <label for="especialidad">Especialidad</label>
            <select id="especialidad" name="especialidad" required>
              <option value="">Seleccione una especialidad</option>
              <option value="GEOGRAFIA">Geografía</option>
              <option value="HISTORIA">Historia</option>
              <option value="ARQUITECTURA">Arquitectura</option>
              <option value="COMIDA">Comida</option>
            </select>

           <!-- <label for="destino">Destino asignado</label>
            <select id="destino" name="destino" required>
              <option value="">Seleccione un destino</option>
               JS rellena -->
            </select>
          </fieldset>

          <button type="submit" class="btn">Crear guía</button>
        </form>

        <p id="mensaje" class="mensaje"></p>
      </section>
    </main>

    <footer>
      <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
    </footer>

    <script src="../js/guias-gemini.js"></script>
  </body>
</html>
