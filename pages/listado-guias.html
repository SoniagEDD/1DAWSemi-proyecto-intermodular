<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Listado de Guías</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/listado-guias.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <span class="logo__icon">✈</span>
        <span class="logo__text">SemiDAW Travel Agency</span>
      </div>

      <nav aria-label="Navegación principal">
        <ul class="nav__list">
          <li><a href="../index.html" class="nav__link">Inicio</a></li>
          <li>
            <a href="../pages/usuario-listado.html" class="nav__link"
              >Usuarios</a
            >
          </li>
          <li>
            <a href="../pages/listado-destinos.html" class="nav__link"
              >Destinos</a
            >
          </li>
          <li>
            <a
              href="../pages/listado-guias.html"
              class="nav__link nav__link--active"
              >Guias</a
            >
          </li>
          <li>
            <a href="../pages/listado-reservas.html" class="nav__link"
              >Reservas</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="list-section" aria-labelledby="list-title">
        <h2 id="list-title" class="guiaClase">Guías registrados</h2>
        <a id="guia" class="guiaClase" href="../pages/crear-guia.html"
          >Crear guia nuevo</a
        >

        <table class="tabla">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre completo</th>
              <th>Especialidad</th>
              <th>Destino asignado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaGuias">
            <!-- Rellenado dinámicamente -->
          </tbody>
        </table>

        <p id="mensaje" class="mensaje"></p>
      </section>
    </main>

    <footer>
      <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
    </footer>

    <script src="../js/guias.js"></script>
  </body>
</html>
