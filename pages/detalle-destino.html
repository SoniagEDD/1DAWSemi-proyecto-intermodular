<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Destino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/detalle-destino.css">
</head>

<body>
<header>
        <div class="logo">
            <span class="logo__icon">✈</span>
            <span class="logo__text">SemiDAW Travel Agency</span>
        </div>

        <nav aria-label="Navegación principal">
            <ul class="nav__list">
                <li><a href="../index.html" class="nav__link">Inicio</a></li>
                <li><a href="../pages/usuario-listado.html" class="nav__link">Usuarios</a></li>
                <li><a href="../pages/listado-destinos.html" class="nav__link nav__link--active">Destinos</a></li>
                <li><a href="../pages/listado-guias.html" class="nav__link">Guias</a></li>
                <li><a href="../pages/listado-reservas.html" class="nav__link">Reservas</a></li>
            </ul>
        </nav>
    </header>

<main>
    <section class="list-section">
        <h2 id="tituloDestino">Destino</h2>

        <article id="infoDestino" class="info-box">
            <!-- JS rellena los datos del destino -->
        </article>

        <h3>Usuarios inscritos</h3>
        <table class="tabla">
            <thead>
                <tr>
                    <th>ID Usuario</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Fecha inicio</th>
                    <th>Fecha fin</th>
                </tr>
            </thead>
            <tbody id="tablaUsuariosDestino">
                <!-- Rellenado dinámicamente -->
            </tbody>
        </table>

        <h3>Guías asignados</h3>
        <table class="tabla">
            <thead>
                <tr>
                    <th>ID Guía</th>
                    <th>Nombre</th>
                    <th>Especialidad</th>
                </tr>
            </thead>
            <tbody id="tablaGuiasDestino">
                <!-- Rellenado dinámicamente -->
            </tbody>
        </table>

        <p id="mensaje" class="mensaje"></p>
    </section>
</main>

<footer>
    <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
</footer>

<script src="../js/destinos.js"></script>
</body>
</html>
