<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Alta de Destino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/crear-destino.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <span class="logo__icon">✈</span>
        <span class="logo__text">SemiDAW Travel Agency</span>
      </div>

      <nav aria-label="Navegación principal">
        <ul class="nav__list">
          <li><a href="../index.html" class="nav__link">Inicio</a></li>
          <li>
            <a href="../pages/usuario-listado.html" class="nav__link"
              >Usuarios</a
            >
          </li>
          <li>
            <a
              href="../pages/listado-destinos.html"
              class="nav__link nav__link--active"
              >Destinos</a
            >
          </li>
          <li>
            <a href="../pages/listado-guias.html" class="nav__link">Guias</a>
          </li>
          <li>
            <a href="../pages/listado-reservas.html" class="nav__link"
              >Reservas</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title">Formulario de creación de destino</h2>

        <form id="formDestino" novalidate>
          <fieldset>
            <legend>Datos del destino</legend>

            <label for="ciudad">Ciudad</label>
            <input
              type="text"
              id="ciudad"
              name="ciudad"
              required
              minlength="2"
              maxlength="40"
              pattern="[A-Za-zÝÉÝÓÚáéíóúñÑ ]+"
            />

            <label for="pais">País</label>
            <input
              type="text"
              id="pais"
              name="pais"
              required
              minlength="2"
              maxlength="40"
              pattern="[A-Za-zÝÉÝÓÚáéíóúñÑ ]+"
            />

            <label for="precio">Precio (€)</label>
            <input
              type="number"
              id="precio"
              name="precio"
              required
              min="1"
              max="99999"
            />

            <label for="requierePasaporte">
              <input
                type="checkbox"
                id="requierePasaporte"
                name="requierePasaporte"
              />
              Requiere pasaporte
            </label>
          </fieldset>

          <button type="submit" id="btnDestino" class="btn">
            Crear destino
          </button>
        </form>

        <p id="mensaje" class="mensaje"></p>
      </section>
    </main>

    <footer>
      <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
    </footer>

    <script src="../js/destinos.js"></script>
  </body>
</html>
