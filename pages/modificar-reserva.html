<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Modificar Reserva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/modificar-reserva.css" />
  </head>

  <body>
    <header>
      <div class="nav__link">
        <span>✈</span>
        <span>SemiDAW Travel Agency</span>
      </div>

      <nav aria-label="Navegación principal">
        <ul class="nav__list">
          <li><a href="../index.html" class="nav__link">Inicio</a></li>
          <li>
            <a href="../pages/usuario-listado.html" class="nav__link"
              >Usuarios</a
            >
          </li>
          <li>
            <a href="../pages/listado-destinos.html" class="nav__link"
              >Destinos</a
            >
          </li>
          <li>
            <a href="../pages/listado-guias.html" class="nav__link">Guias</a>
          </li>
          <li>
            <a
              href="../pages/listado-reservas.html"
              class="nav__link nav__link--active"
              >Reservas</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title">Modificar Reserva</h2>

        <form id="formModificarReserva" novalidate>
          <fieldset>
            <legend>Datos de la reserva</legend>

            <label for="usuario">Usuario</label>
            <input
              type="text"
              id="usuario"
              name="usuario"
              value="María López (sin pasaporte)"
              disabled
            />

            <label for="destinoActual">Destino actual</label>
            <input
              type="text"
              id="destinoActual"
              name="destinoActual"
              value="París"
              disabled
            />

            <label for="nuevoDestino">Nuevo destino</label>
            <select id="nuevoDestino" name="nuevoDestino" required>
              <option value="">Seleccione un destino</option>
              <option>París</option>
              <option>Roma</option>
              <option>Londres</option>
              <option>Tokio</option>
            </select>

            <label for="fecha">Fecha de viaje</label>
            <input type="date" id="fecha" name="fecha" required />
          </fieldset>

          <button type="submit" class="btn">Guardar cambios</button>
        </form>

        <p id="mensaje" class="mensaje"></p>
      </section>
    </main>

    <footer>
      <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
    </footer>

    <script src="../js/modificar-reserva.js"></script>
  </body>
</html>
