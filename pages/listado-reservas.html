<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Listado de Reservas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/listado-reservas.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <span class="logo__icon">✈</span>
        <span class="logo__text">SemiDAW Travel Agency</span>
      </div>

      <nav aria-label="Navegación principal">
        <ul class="nav__list">
          <li><a href="../index.html" class="nav__link">Inicio</a></li>
          <li>
            <a href="../pages/usuario-listado.html" class="nav__link"
              >Usuarios</a
            >
          </li>
          <li>
            <a href="../pages/listado-destinos.html" class="nav__link"
              >Destinos</a
            >
          </li>
          <li>
            <a href="../pages/listado-guias.html" class="nav__link">Guias</a>
          </li>
          <li>
            <a
              href="../pages/listado-reservas.html"
              class="nav__link nav__link--active"
              >Reservas</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="list-section" aria-labelledby="list-title">
        <h2 id="list-title" class="reservaClase">Reservas registradas</h2>

        <a id="reserva" class="reservaClase" href="../pages/crear-reserva.html"
          >Crear reserva</a
        >

        <table class="tabla">
          <thead>
            <tr>
              <th>ID Usuario</th>
              <th>Nombre usuario</th>
              <th>Destino</th>
              <th>Fecha inicio</th>
              <th>Fecha fin</th>
              <th id="Acciones">Acciones</th>
              <th></th>
            </tr>
          </thead>

          <tbody id="tablaReservas">
            <!-- Rellenado dinámicamente -->
          </tbody>
        </table>

        <p id="mensaje" class="mensaje"></p>
      </section>
    </main>

    <footer>
      <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
    </footer>

    <script src="../js/listado-reservas.js"></script>
  </body>
</html>
