    <main>
      <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title">Formulario de creación de usuario</h2>

        <form id="formUsuario" novalidate>
          <fieldset>
            <legend>Datos personales</legend>

            <label for="nombre">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              required
              minlength="2"
              maxlength="40"
              pattern="[A-Za-zÝÉÝÓÚáéíóúñÑ ]+"
            />

            <label for="apellidos">Apellidos</label>
            <input
              type="text"
              id="apellidos"
              name="apellidos"
              required
              minlength="2"
              maxlength="60"
              pattern="[A-Za-zÝÉÝÓÚáéíóúñÑ ]+"
            />

            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              maxlength="80"
            />

            <label for="telefono">Teléfono</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              required
              pattern="[0-9]{9}"
              maxlength="9"
            />

            <label for="fecha_nacimiento">Fecha de nacimiento</label>
            <input
              type="date"
              id="fecha_nacimiento"
              name="fecha_nacimiento"
              required
            />
          </fieldset>

          <!--<fieldset>
            <legend>Pasaporte (opcional)</legend>

            <label class="no-flex">

              Crear pasaporte ahora

            <div id="pasaporteFields">

            </div>

          <button type="submit" class="btn" id="form" name="form">
            Crear usuario
          </button>
        </form>

        <p id="mensaje" class="mensaje"></p>
