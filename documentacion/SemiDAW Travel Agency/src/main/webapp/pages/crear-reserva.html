<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción a Destino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/crear-reserva.css">
</head>

<body>
<header>
        <div class="logo">
            <span class="logo__icon">✈</span>
            <span class="logo__text">SemiDAW Travel Agency</span>
        </div>

        <nav aria-label="Navegación principal">
            <ul class="nav__list">
                <li><a href="../index.html" class="nav__link">Inicio</a></li>
                <li><a href="../pages/usuario-listado.html" class="nav__link">Usuarios</a></li>
                <li><a href="../pages/listado-destinos.html" class="nav__link">Destinos</a></li>
                <li><a href="../pages/listado-guias.html" class="nav__link">Guias</a></li>
                <li><a href="../pages/listado-reservas.html" class="nav__link nav__link--active">Reservas</a></li>
            </ul>
        </nav>
    </header>

<main>
    <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title">Formulario de inscripción (Reserva)</h2>

        <form id="formInscripcion" novalidate>
            <fieldset>
                <legend>Datos de inscripción</legend>

                <label for="usuario">Usuario</label>
                <select id="usuario" name="usuario" required>
                    <option value="">Seleccione un usuario</option>
                    <!-- JS rellena -->
                </select>

                <label for="destino">Destino</label>
                <select id="destino" name="destino" required>
                    <option value="">Seleccione un destino</option>
                    <!-- JS rellena -->
                </select>

                <label for="fechaInicio">Fecha de inicio</label>
                <input type="date" id="fechaInicio" name="fechaInicio" required>

                <label for="fechaFin">Fecha de fin</label>
                <input type="date" id="fechaFin" name="fechaFin" required>
            </fieldset>

            <button type="submit" class="btn">Inscribir usuario</button>
        </form>

        <p id="mensaje" class="mensaje"></p>
    </section>
</main>

<footer>
    <p>© 2026 Agencia de Viajes SemiDAW · Páginas de Prueba</p>
</footer>

<script src="../js/inscripcion.js"></script>
</body>
</html>
